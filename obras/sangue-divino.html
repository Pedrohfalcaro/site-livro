<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sangue Divino — Estante de Histórias</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --border:#e2e8f0;
      --accent:#ef4444;
    }

    body{ background:var(--bg); color:var(--text); }

    body.dark-mode{
      --bg:#0b1220;
      --card:#111827;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --border:#263244;
    }

    .surface{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
    }

    .btn{
      border-radius:9999px;
      padding:.7rem 1.2rem;
      font-weight:800;
    }

    .btn-primary{
      background:#14b8a6;
      color:#fff;
    }

    .btn-ghost{
      border:1px solid var(--border);
    }

    .muted2{ color:var(--muted); }

    /* NAV */
    .glass{
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
    }

    body.dark-mode .glass{
      background:rgba(11,18,32,.68);
    }

    .theme-dot{
      width:24px;
      height:24px;
      border-radius:9999px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.35);
    }

    #temaClaro{ background:linear-gradient(90deg,#fff 50%, #14b8a6 50%); }
    #temaEscuro{ background:linear-gradient(90deg,#0b1220 50%, #38bdf8 50%); }

    /* HERO */
    .hero-bg{
      background:
        radial-gradient(circle at 20% 20%, rgba(239,68,68,.2), transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(56,189,248,.15), transparent 60%),
        linear-gradient(var(--bg), var(--card));
    }

    body.dark-mode .hero-bg{
      background:
        radial-gradient(circle at 20% 20%, rgba(239,68,68,.25), transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(56,189,248,.2), transparent 60%),
        linear-gradient(#020617, #0b1220);
    }

    .titulo-epico{
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight:900;
    }

    /* 🌊 OCEANO CORRIGIDO */
    .oceano{
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 30% 40%, rgba(56,189,248,.25), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(14,165,233,.25), transparent 60%),
        linear-gradient(180deg, #dbeafe, #bfdbfe);
    }

    body.dark-mode .oceano{
      background:
        radial-gradient(circle at 30% 40%, rgba(56,189,248,.12), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(14,165,233,.12), transparent 60%),
        linear-gradient(180deg, #020617, #0b1220);
    }

    .oceano::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          120deg,
          rgba(255,255,255,.02) 0px,
          rgba(255,255,255,.02) 2px,
          transparent 2px,
          transparent 6px
        );
    }

    .bolhas{
      position:absolute;
      width:100%;
      height:100%;
      background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: flutuar 25s linear infinite;
    }

    @keyframes flutuar{
      from{ transform:translateY(0); }
      to{ transform:translateY(-200px); }
    }

    .glow{
      position:absolute;
      inset:-40px;
      background: radial-gradient(circle, rgba(14,165,233,.15), transparent 70%);
      filter: blur(60px);
    }

    body:not(.dark-mode) .glow{
      background: radial-gradient(circle, rgba(14,165,233,.25), transparent 70%);
      opacity:.4;
    }

    /* TRILHA */
    .linha-segmento{
      flex:1;
      height:6px;
      margin:0 12px;
      background: linear-gradient(to right, rgba(56,189,248,.6), transparent);
      border-radius:999px;
      position:relative;
      opacity:.6;
    }

    .linha-segmento::after{
      content:"";
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      width:8px;
      height:8px;
      background:#38bdf8;
      border-radius:50%;
      box-shadow:0 0 10px #38bdf8;
    }

    /* 🔥 NODOS CORRIGIDOS */
    .nodo{
      width:130px;
      height:130px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      transition:.25s;
      color:#fff;
    }

    body:not(.dark-mode) .nodo{
      background:#1e293b;
    }

    body:not(.dark-mode) .ativo{
      background:#020617;
    }

    .ativo{
      border:2px solid var(--accent);
      box-shadow: 0 0 25px rgba(239,68,68,.4);
    }

    .ativo:hover{
      transform:scale(1.08);
      box-shadow: 0 0 40px rgba(239,68,68,.7);
    }

    .bloqueado{
      opacity:.4;
      filter: grayscale(100%);
    }

  </style>
</head>

<body class="font-sans">

<!-- NAVBAR -->
<nav class="glass sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

    <div class="flex items-center gap-3">
      <a href="../index.html">
        <img src="../imagens/LogoSite.png" class="h-10"/>
      </a>

      <button id="temaClaro" class="theme-dot"></button>
      <button id="temaEscuro" class="theme-dot"></button>
    </div>

    <div class="text-center">
      <h1 class="font-extrabold text-lg">Sangue Divino</h1>
      <p class="text-xs muted2">Saga • Jornada • Capítulos</p>
    </div>

    <div class="flex gap-2">
      <a href="../index.html" class="btn btn-ghost hidden md:inline-flex">Início</a>
      <a href="../contos.html" class="btn btn-ghost hidden md:inline-flex">Contos</a>
      <a href="../loja.html" class="btn btn-primary">Loja</a>
    </div>

  </div>
</nav>

<!-- HERO -->
<header class="hero-bg">
  <div class="max-w-6xl mx-auto px-4 py-12">

    <span class="inline-block px-3 py-1 text-xs font-extrabold rounded-full"
      style="background:rgba(239,68,68,.15); color:#ef4444;">
      🩸 Jornada Serializada
    </span>

    <h1 class="titulo-epico mt-4">
      Sangue <span style="color:#ef4444">Divino</span>
    </h1>

    <p class="mt-4 max-w-2xl text-lg muted2">
      Uma jornada em capítulos semanais.  
      Cada saga é um passo mais profundo no desconhecido.
    </p>

  </div>
</header>

<!-- TRILHA -->
<section class="max-w-6xl mx-auto px-4 py-12">

  <div class="oceano rounded-2xl p-12 relative">

    <div class="glow"></div>
    <div class="bolhas"></div>

    <div class="relative flex items-center justify-between">

      <a href="SangueDivino/saga1.html" class="nodo ativo z-10">
        <div>
          <img src="../imagens/Sangue-divino-saga1capa.png"
               class="w-20 mx-auto mb-2 rounded-lg"/>
          Saga 1
        </div>
      </a>

      <div class="linha-segmento"></div>

      <div class="nodo bloqueado z-10">Saga 2</div>

      <div class="linha-segmento"></div>

      <div class="nodo bloqueado z-10">Saga 3</div>

      <div class="linha-segmento"></div>

      <div class="nodo bloqueado z-10">Saga 4</div>

    </div>

  </div>

</section>

<script>
(function () {
  const BODY = document.body;
  const KEY = 'theme';

  function apply(theme) {
    if (theme === 'dark') BODY.classList.add('dark-mode');
    else BODY.classList.remove('dark-mode');
  }

  apply(localStorage.getItem(KEY) || 'light');

  function setTheme(t){
    localStorage.setItem(KEY, t);
    apply(t);
  }

  document.getElementById('temaClaro').onclick = () => setTheme('light');
  document.getElementById('temaEscuro').onclick = () => setTheme('dark');
})();
</script>

</body>
</html>
